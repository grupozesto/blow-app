<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Blow — Portal de Negocios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1b3e;
  --card:#162040;
  --card2:#1a2850;
  --border:rgba(255,255,255,.08);
  --primary:#3b82f6;
  --primary-dark:#1e40af;
  --text:#ffffff;
  --muted:rgba(255,255,255,.5);
  --muted2:rgba(255,255,255,.25);
  --green:#22c55e;
  --red:#ef4444;
  --r:14px;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(160deg,#0f1e4a 0%,#1e40af 70%,#3b82f6 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:24px;}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);border-radius:24px;padding:32px 26px;width:100%;max-width:380px;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-icon{width:72px;height:72px;border-radius:18px;overflow:hidden;margin:0 auto 14px;box-shadow:0 8px 24px rgba(234,53,107,.4);}
.login-icon img{width:100%;height:100%;object-fit:cover;}
.login-title{font-size:22px;font-weight:900;color:#fff;}
.login-sub{font-size:13px;color:rgba(255,255,255,.55);margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.login-field input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;outline:none;font-family:inherit;}
.login-field input:focus{border-color:var(--primary);}
.login-field input::placeholder{color:rgba(255,255,255,.3);}
.login-btn{width:100%;background:var(--primary);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(59,130,246,.4);}
.login-err{color:#fca5a5;font-size:13px;text-align:center;margin-top:10px;min-height:18px;}
.login-switch{text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,.45);}
.login-switch a{color:var(--primary);font-weight:700;text-decoration:none;}

/* ── APP ── */
#app{display:none;min-height:100vh;background:var(--bg);}

/* ── HEADER ── */
#header{padding:max(14px,env(safe-area-inset-top)) 16px 14px;display:flex;align-items:center;gap:12px;background:var(--card);border-bottom:1px solid var(--border);}
#header-logo{width:44px;height:44px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;}
#header-logo img{width:100%;height:100%;object-fit:cover;}
.header-info{flex:1;min-width:0;}
.header-biz-name{font-size:16px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-biz-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.header-status-open{background:#15803d;color:#fff;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
.header-status-closed{background:rgba(239,68,68,.2);color:#fca5a5;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
.header-exit{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:6px 12px;color:rgba(255,255,255,.7);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:inherit;}

/* ── KPI BAR ── */
#kpi-bar{display:flex;border-bottom:1px solid var(--border);}
.kpi-item{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border);}
.kpi-item:last-child{border-right:none;}
.kpi-val{font-size:20px;font-weight:900;color:var(--text);}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}

/* ── CONTENT ── */
#content{padding:16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));overflow-y:auto;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.card+.card{margin-top:10px;}
.card-dark{background:var(--card2);}

/* ── TOGGLE ── */
.toggle{width:52px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--green);}
.toggle.off{background:rgba(255,255,255,.2);}
.toggle-knob{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.toggle.on .toggle-knob{left:25px;}
.toggle.off .toggle-knob{left:3px;}

/* ── BOTTOM NAV ── */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:10px;font-weight:600;font-family:inherit;position:relative;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-btn.active{color:var(--primary);}
.nav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:#ef4444;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;}

/* ── SECTION LABEL ── */
.sec-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px;}

/* ── ACTION GRID ── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.action-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;cursor:pointer;text-align:left;font-family:inherit;transition:border-color .15s;}
.action-btn:hover{border-color:var(--primary);}
.action-icon{font-size:24px;margin-bottom:8px;display:block;}
.action-title{font-size:14px;font-weight:700;color:var(--text);display:block;}
.action-sub{font-size:11px;color:var(--muted);margin-top:2px;display:block;}

/* ── ORDER CARD ── */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;border-left:3px solid var(--primary);}
.order-card.pending{border-left-color:#f59e0b;}
.order-card.confirmed{border-left-color:#3b82f6;}
.order-card.preparing{border-left-color:#8b5cf6;}
.order-card.ready{border-left-color:#22c55e;}
.order-card.on_way{border-left-color:#0ea5e9;}
.order-card.cancelled{border-left-color:#ef4444;}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-yellow{background:rgba(245,158,11,.2);color:#fbbf24;}
.badge-blue{background:rgba(59,130,246,.2);color:#60a5fa;}
.badge-purple{background:rgba(139,92,246,.2);color:#a78bfa;}
.badge-green{background:rgba(34,197,94,.2);color:#4ade80;}
.badge-sky{background:rgba(14,165,233,.2);color:#38bdf8;}
.badge-red{background:rgba(239,68,68,.2);color:#fca5a5;}
.badge-gray{background:rgba(255,255,255,.1);color:var(--muted);}

/* ── WALLET CARD ── */
.wallet-card{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:var(--r);padding:20px;color:#fff;}

/* ── INPUT ── */
.field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.field-input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:9px;padding:10px 13px;color:#fff;font-size:14px;font-family:inherit;outline:none;}
.field-input:focus{border-color:var(--primary);}
.field-input::placeholder{color:var(--muted);}
textarea.field-input{resize:none;}
select.field-input{background:var(--card2);}

/* ── BUTTONS ── */
.btn{padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-ghost{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);}
.btn-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.2);}
.btn-full{width:100%;padding:13px;}

/* ── SPINNER ── */
.spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,64,175,.95);border:1px solid rgba(59,130,246,.3);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;color:#fff;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);}
#toast.show{opacity:1;}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
#modal-overlay.show{display:flex;}
#modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:18px;}

/* ── CHAT OVERLAY ── */
#chat-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
</style>
</head>

<script>
// ════════ STATE ════════
let _token = localStorage.getItem('blow_biz_token')||'';
let _user  = (()=>{try{return JSON.parse(localStorage.getItem('blow_biz_user')||'null');}catch(_){return null;}})();
let _biz=null, _dash=null, _tab='home', _refreshTimer=null, _statsPeriod=7;
let _npPhotos=[null,null,null,null], _bankAccounts=[], _selectedAccountId=null;
let _chatOrderId=null, _chatPollTimer=null, _deliveryTimer=null;
let _ooWalletIdx=0, _ooTouchX=0;

// ════════ INIT ════════
window.addEventListener('DOMContentLoaded',()=>{
  if(_token&&_user&&(_user.role==='owner'||_user.role==='admin')){
    showApp();
  } else {
    document.getElementById('login-screen').style.display='flex';
  }
});

// ════════ AUTH ════════
function showLogin(){
  document.getElementById('register-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function showRegister(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('register-screen').style.display='flex';
}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Completá todos los campos';return;}
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.error||'Error al iniciar sesión';return;}
    if(d.user.role!=='owner'&&d.user.role!=='admin'){err.textContent='Esta cuenta no tiene acceso al portal de negocios';return;}
    _token=d.token;_user=d.user;
    localStorage.setItem('blow_biz_token',_token);
    localStorage.setItem('blow_biz_user',JSON.stringify(_user));
    document.getElementById('login-screen').style.display='none';
    showApp();
  }catch(e){err.textContent='Error de conexión';}
}
async function doRegister(){
  const bizName=document.getElementById('r-biz').value.trim();
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const phone=document.getElementById('r-phone').value.trim();
  const pass=document.getElementById('r-pass').value;
  const address=document.getElementById('r-address').value.trim();
  const err=document.getElementById('r-err');
  err.textContent='';
  if(!bizName||!name||!email||!phone||!pass){err.textContent='Completá todos los campos obligatorios';return;}
  if(pass.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres';return;}
  try{
    const r=await fetch('/api/auth/register-business',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({business_name:bizName,name,email,phone,password:pass,address,role:'owner'})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.error||'Error al registrarse';return;}
    _token=d.token;_user=d.user;
    localStorage.setItem('blow_biz_token',_token);
    localStorage.setItem('blow_biz_user',JSON.stringify(_user));
    document.getElementById('register-screen').style.display='none';
    showApp();
  }catch(e){err.textContent='Error de conexión';}
}
function doLogout(){
  if(!confirm('¿Cerrar sesión del portal?'))return;
  localStorage.removeItem('blow_biz_token');localStorage.removeItem('blow_biz_user');
  _token='';_user=null;_biz=null;_dash=null;
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
function volverABlow(){
  localStorage.removeItem('blow_biz_token');localStorage.removeItem('blow_biz_user');
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  window.location.href='/';
}

// ════════ API ════════
async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{'Content-Type':'application/json',Authorization:'Bearer '+_token,...(opts.headers||{})}});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||r.statusText);
  return d;
}

// ════════ APP ════════
async function showApp(){
  document.getElementById('app').style.display='block';
  await loadDash();
  navTo('home');
  startRefresh();
}
async function loadDash(){
  try{
    const d=await api('/api/businesses/mine/dashboard');
    _dash=d;_biz=d.business||{};
    updateHeader();updateKPIs();
  }catch(e){showToast('❌ Error al cargar datos');}
}
function updateHeader(){
  const b=_biz||{};
  document.getElementById('hdr-name').textContent=b.name||'Mi Negocio';
  document.getElementById('hdr-sub').textContent=b.city||'Portal de gestión';
  const statusEl=document.getElementById('hdr-status');
  statusEl.textContent=b.is_open?'● Abierto':'● Cerrado';
  statusEl.className=b.is_open?'header-status-open':'header-status-closed';
  const logoEl=document.getElementById('header-logo');
  if(b.logo_url)logoEl.innerHTML=`<img src="${b.logo_url}" style="width:100%;height:100%;object-fit:cover;">`;
  else logoEl.textContent=b.logo_emoji||'🏪';
}
function updateKPIs(){
  const d=_dash||{};
  const today=d.today||{};
  const orders=d.orders||[];
  const pending=orders.filter(o=>o.status==='pending').length;
  document.getElementById('kpi-orders').textContent=today.orders||0;
  document.getElementById('kpi-revenue').textContent='$'+Math.round(today.revenue||0);
  document.getElementById('kpi-pending').textContent=pending;
  const badge=document.getElementById('pending-badge');
  badge.textContent=pending;badge.style.display=pending>0?'':'none';
}
function startRefresh(){
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(async()=>{
    try{
      const d=await api('/api/businesses/mine/dashboard');
      const prev=(_dash?.orders||[]).filter(o=>o.status==='pending').length;
      _dash=d;_biz=d.business||{};
      updateHeader();updateKPIs();
      const cur=(d.orders||[]).filter(o=>o.status==='pending').length;
      if(cur>prev){playAlert();if(_tab==='home')renderHome();else if(_tab==='orders')renderOrders();}
    }catch(_){}
  },30000);
}

// ════════ NAV ════════
function navTo(tab){
  _tab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('content').innerHTML='<div class="spinner"></div>';
  if(tab==='home')renderHome();
  else if(tab==='orders')renderOrders();
  else if(tab==='menu')renderMenu();
  else if(tab==='stats')renderStats();
  else if(tab==='settings')renderSettings();
}

// Wallet swipe
function wTouchStart(e){_ooTouchX=e.touches[0].clientX;}
function wTouchEnd(e){const dx=e.changedTouches[0].clientX-_ooTouchX;if(dx<-40)walletGo(_ooWalletIdx+1);else if(dx>40)walletGo(_ooWalletIdx-1);}
function walletGo(n){
  _ooWalletIdx=Math.max(0,Math.min(2,n));
  const t=document.getElementById('wallet-track');if(t)t.style.transform=`translateX(-${_ooWalletIdx*100}%)`;
  document.querySelectorAll('#wallet-dots div').forEach((d,i)=>d.style.background=i===_ooWalletIdx?'var(--primary)':'rgba(255,255,255,.2)');
}

function loadWalletData(){
  const d=_dash||{};
  const balance=parseFloat(d.balance)||0;
  const orders=d.orders||[];
  const todayO=orders.filter(o=>{const dt=new Date(o.created_at);return dt.toDateString()===new Date().toDateString()&&o.status!=='cancelled';});
  const todayRev=todayO.reduce((s,o)=>s+(parseFloat(o.total)||0),0);
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent='$'+Math.round(v);};
  s('w-mp-val',balance);s('w-mp-today',todayRev);s('w-cash-val',0);s('w-cash-today',0);s('w-total-val',balance);s('w-month-val',Math.round(parseFloat((d.week||{}).revenue)||0));
}

async function changeDeliveryTime(delta){
  if(!_biz)return;
  let cur=parseInt((_biz.delivery_time||'30').toString().split('-').pop())||30;
  cur=Math.max(5,Math.min(120,cur+delta));
  _biz.delivery_time=String(cur);
  const el=document.getElementById('delivery-time-display');if(el)el.textContent=cur+' min';
  if(_deliveryTimer)clearTimeout(_deliveryTimer);
  _deliveryTimer=setTimeout(async()=>{try{await api('/api/businesses/mine',{method:'PATCH',body:JSON.stringify({delivery_time:String(cur)})});showToast('⏱️ Tiempo actualizado');}catch(e){showToast('❌ Error al guardar');}},1500);
}

async function toggleOpen(){
  if(!_biz)return;
  const newState=!_biz.is_open;
  try{
    const d=await api('/api/businesses/mine',{method:'PATCH',body:JSON.stringify({is_open:newState})});
    _biz.is_open=d.is_open;
    updateHeader();
    const btn=document.getElementById('toggle-btn');if(btn){btn.className=`toggle ${d.is_open?'on':'off'}`;btn.innerHTML='<div class="toggle-knob"></div>';}
    const sub=document.getElementById('toggle-sub');if(sub)sub.textContent=d.is_open?'Estás recibiendo pedidos':'No estás recibiendo pedidos';
    showToast(d.is_open?'✅ Negocio abierto':'⏸️ Negocio cerrado');
  }catch(e){showToast('❌ '+e.message);}
}

  const pay=o.payment_method==='cash'?'💵 Efectivo':'💳 Online';
  const typ=o.fulfillment_type==='pickup'?'🏪 Retira':'🛵 Delivery';
  return `<div class="order-card ${o.status}" style="margin-bottom:10px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;">

    ${!compact?`
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;"><b style="color:var(--text);">${o.customer_name||'Cliente'}</b> · ${typ} · ${pay}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:${next?'10px':'0'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${items}</div>`:''}
    ${next?`<div style="display:flex;gap:8px;">
      <button onclick="updateOrder('${o.id}','${next.next}')" style="flex:1;background:var(--primary);border:none;border-radius:10px;padding:10px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">${next.label}</button>
      <button onclick="openChat('${o.id}','${(o.customer_name||'Cliente').replace(/'/g,"\'")}',this)" style="background:rgba(59,130,246,.15);border:none;border-radius:10px;padding:10px 13px;color:#60a5fa;font-size:12px;font-weight:700;cursor:pointer;">💬</button>
      <button onclick="updateOrder('${o.id}','cancelled')" style="background:rgba(239,68,68,.15);border:none;border-radius:10px;padding:10px 13px;color:#fca5a5;font-size:12px;font-weight:700;cursor:pointer;">✕</button>
    </div>`:`<button onclick="openChat('${o.id}','${(o.customer_name||'Cliente').replace(/'/g,"\'")}',this)" style="width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:8px;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;">💬 Ver chat</button>`}
  </div>`;
}

// ════════ ORDERS TAB ════════
async function renderOrders(){
  const el=document.getElementById('content');
  try{
    const data=await api('/api/orders');
    const orders=Array.isArray(data)?data:(data.orders||[]);
    const active=orders.filter(o=>!['delivered','cancelled'].includes(o.status));
    const done=orders.filter(o=>['delivered','cancelled'].includes(o.status)).slice(0,10);
    el.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:15px;font-weight:800;">En curso (${active.length})</div>
      </div>
      ${active.length?active.map(o=>renderOrderCard(o)).join(''):'<div class="empty"><div class="empty-icon">📭</div><div>Sin pedidos activos</div></div>'}
      ${done.length?`<div class="sec-label" style="margin-top:16px;">RECIENTES</div>${done.map(o=>renderOrderCard(o,true)).join('')}`:''}`;
  }catch(e){el.innerHTML=`<div style="color:var(--red);padding:20px;text-align:center;">${e.message}</div>`;}
}

async function updateOrder(id,status){
  if(status==='cancelled'&&!confirm('¿Cancelar este pedido?'))return;
  try{
    if(status==='cancelled')await api(`/api/orders/${id}/cancel`,{method:'POST'});
    else await api(`/api/orders/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});
    showToast(status==='cancelled'?'✅ Pedido cancelado':'✅ Estado actualizado');
    const d=await api('/api/businesses/mine/dashboard');_dash=d;_biz=d.business||{};
    updateHeader();updateKPIs();
    if(_tab==='home')renderHome();else renderOrders();
  }catch(e){showToast('❌ '+e.message);}
}

function npPhotoSelected(slot,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{_npPhotos[slot]={data:e.target.result.split(',')[1],mime_type:file.type};const sl=document.getElementById(`np-slot-${slot}`);if(sl){sl.style.border='2px solid var(--primary)';sl.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;"><button onclick="event.stopPropagation();npRemovePhoto(${slot})" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:11px;cursor:pointer;">✕</button><input type="file" id="np-input-${slot}" accept="image/*" style="display:none;" onchange="npPhotoSelected(${slot},this)">`;}};
  reader.readAsDataURL(file);
}
function npRemovePhoto(slot){_npPhotos[slot]=null;const sl=document.getElementById(`np-slot-${slot}`);if(sl){sl.style.border='2px dashed var(--border)';sl.innerHTML=`<div style="font-size:20px;color:var(--muted2);">📷</div><div style="font-size:9px;color:var(--muted);margin-top:3px;">${slot===0?'Principal':'Foto '+(slot+1)}</div><input type="file" id="np-input-${slot}" accept="image/*" style="display:none;" onchange="npPhotoSelected(${slot},this)">`;}}
async function saveProduct(editId=null){
  const btn=document.getElementById('np-save-btn');

    const body={name,price,emoji:document.getElementById('np-emoji')?.value?.trim()||'🍽️',description:document.getElementById('np-desc')?.value?.trim()||'',discount_percent:parseInt(document.getElementById('np-discount')?.value)||0,category_id:document.getElementById('np-cat')?.value||null,preparation_time:parseInt(document.getElementById('np-preptime')?.value)||null,calories:parseInt(document.getElementById('np-calories')?.value)||null,allergens:document.getElementById('np-allergens')?.value?.trim()||'',stock:document.getElementById('np-stock')?.value!==''?parseInt(document.getElementById('np-stock')?.value):null,is_featured:document.getElementById('np-featured')?.checked||false,is_available:document.getElementById('np-available')?.checked!==false,available_from:document.getElementById('np-from')?.value||null,available_until:document.getElementById('np-until')?.value||null,photos:photos.map(p=>({data:p.data,mime_type:p.mime_type}))};
    if(editId)await api(`/api/businesses/mine/products/${editId}`,{method:'PATCH',body:JSON.stringify(body)});

  }catch(e){btn.textContent=editId?'Guardar cambios':'Publicar producto';btn.disabled=false;showToast('❌ '+e.message);}
}

// ════════ STATS ════════
async function renderStats(period){
  if(period)_statsPeriod=period;
  const el=document.getElementById('content');
  el.innerHTML='<div class="spinner"></div>';
  try{
    const data=await api('/api/businesses/mine/stats?days='+_statsPeriod);
    const today=_dash?.today||{};const week=_dash?.week||{};
    const rows=data.days||[];const topProducts=data.topProducts||[];
    const dateMap={};const now=new Date();
    for(let i=_statsPeriod-1;i>=0;i--){const dt=new Date(now);dt.setDate(dt.getDate()-i);dateMap[dt.toISOString().slice(0,10)]={orders:0,revenue:0};}
    rows.forEach(r=>{if(dateMap[r.day]){dateMap[r.day].orders=parseInt(r.orders)||0;dateMap[r.day].revenue=parseFloat(r.revenue)||0;}});
    const entries=Object.entries(dateMap);
    const totalRev=entries.reduce((s,[,v])=>s+v.revenue,0);
    const totalOrd=entries.reduce((s,[,v])=>s+v.orders,0);
    const avgTicket=totalOrd>0?Math.round(totalRev/totalOrd):0;
    const maxRev=Math.max(...entries.map(([,v])=>v.revenue),1);
    const dayNames=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const barW=Math.floor(280/entries.length);const chartH=80;
    const svgBars=entries.map(([date,v],i)=>{const h=Math.max(3,Math.round((v.revenue/maxRev)*chartH));const x=i*barW+2;const y=chartH-h;const dn=dayNames[new Date(date+'T12:00:00').getDay()];return `<g><rect x="${x}" y="${y}" width="${barW-3}" height="${h}" rx="3" fill="${v.revenue>0?'#3b82f6':'rgba(255,255,255,.08)'}"/>${_statsPeriod<=14?`<text x="${x+(barW-3)/2}" y="${chartH+14}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.4)">${dn}</text>`:''}</g>`;}).join('');
    const pills=[7,14,30].map(p=>`<button onclick="renderStats(${p})" style="padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;background:${_statsPeriod===p?'var(--primary)':'rgba(255,255,255,.08)'};color:${_statsPeriod===p?'#fff':'var(--muted)'};">${p} días</button>`).join('');
    el.innerHTML=`
      <div style="display:flex;gap:6px;margin-bottom:14px;">${pills}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
        <div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:900;color:var(--primary);">${totalOrd}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">Pedidos</div></div>
        <div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:900;color:#4ade80;">$${Math.round(totalRev)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">Ingresos</div></div>
        <div class="card" style="text-align:center;"><div style="font-size:20px;font-weight:900;">$${avgTicket}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">Ticket prom.</div></div>
      </div>
      <div class="card" style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">Ingresos — ${_statsPeriod} días</div>
        <svg width="100%" viewBox="0 0 ${entries.length*barW} ${chartH+(_statsPeriod<=14?20:4)}" preserveAspectRatio="none" style="display:block;">${svgBars}</svg>
      </div>
      <div class="card" style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">🏆 Más vendidos</div>
        ${topProducts.length?topProducts.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;${i<topProducts.length-1?'border-bottom:1px solid var(--border)':''}"><div style="width:18px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);">${i+1}</div><div style="font-size:18px;">${p.emoji||'🍽️'}</div><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div><div style="font-size:11px;color:var(--muted);">${p.qty} vendidos</div></div><div style="font-size:13px;font-weight:800;">$${Math.round(p.revenue)}</div></div>`).join(''):'<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">Sin ventas en el período</div>'}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="card"><div style="font-size:10px;font-weight:700;color:#60a5fa;margin-bottom:4px;">HOY</div><div style="font-size:18px;font-weight:900;">$${Math.round(today.revenue||0)}</div><div style="font-size:12px;color:var(--muted);">${today.orders||0} pedidos</div></div>
        <div class="card"><div style="font-size:10px;font-weight:700;color:#4ade80;margin-bottom:4px;">ESTA SEMANA</div><div style="font-size:18px;font-weight:900;">$${Math.round(week.revenue||0)}</div><div style="font-size:12px;color:var(--muted);">${week.orders||0} pedidos</div></div>
      </div>`;
  }catch(e){el.innerHTML=`<div style="color:var(--red);padding:20px;text-align:center;">${e.message}</div>`;}
}

function schedToggle(key,btn){const enabled=btn.dataset.enabled!=='true';btn.dataset.enabled=enabled;btn.style.background=enabled?'var(--primary)':'rgba(255,255,255,.15)';btn.children[0].style.cssText=`width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:3px;${enabled?'right:3px':'left:3px'};box-shadow:0 1px 3px rgba(0,0,0,.3);`;['open','close'].forEach(t=>{const e=document.getElementById(`sc-${t}-${key}`);if(e)e.style.opacity=enabled?'1':'0.3';});}

// ════════ REVIEWS ════════
async function renderReviews(){
  const el=document.getElementById('content');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='settings'));
  el.innerHTML='<div class="spinner"></div>';
  try{
    const reviews=await api('/api/businesses/mine/reviews');
    if(!reviews.length){el.innerHTML='<div class="empty"><div class="empty-icon">⭐</div><div>Todavía no tenés reseñas</div></div>';return;}
    const avg=(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1);
    el.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
        <button onclick="renderSettings()" class="btn btn-ghost">← Volver</button>
        <div style="font-size:15px;font-weight:800;">⭐ Reseñas</div>
      </div>
      <div class="card" style="text-align:center;margin-bottom:12px;">
        <div style="font-size:38px;font-weight:900;">${avg}</div>
        <div style="color:#fbbf24;font-size:20px;margin:4px 0;">${'⭐'.repeat(Math.round(parseFloat(avg)))}</div>
        <div style="font-size:13px;color:var(--muted);">${reviews.length} reseña${reviews.length!==1?'s':''}</div>
      </div>
      ${reviews.map(r=>`<div class="card" style="margin-bottom:10px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><div style="font-size:13px;font-weight:700;">${r.customer_name||'Cliente'}</div><div>${'⭐'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div>${r.comment?`<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">"${r.comment}"</div>`:''}<div style="font-size:11px;color:var(--muted2);margin-bottom:${r.owner_reply?'10':'0'}px;">${new Date(r.created_at).toLocaleDateString('es-UY',{day:'2-digit',month:'short',year:'numeric'})}</div>${r.owner_reply?`<div style="background:rgba(59,130,246,.1);border-left:3px solid var(--primary);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;"><div style="font-size:11px;font-weight:700;color:var(--primary);margin-bottom:3px;">Tu respuesta</div><div style="font-size:13px;color:var(--muted);">${r.owner_reply}</div></div>`:`<div style="margin-top:8px;display:flex;gap:8px;"><input id="reply-${r.id}" placeholder="Escribí tu respuesta..." class="field-input" style="flex:1;padding:8px 12px;font-size:13px;"><button onclick="replyReview('${r.id}')" class="btn btn-primary" style="padding:8px 14px;">→</button></div>`}</div>`).join('')}`;
  }catch(e){el.innerHTML=`<div style="color:var(--red);padding:20px;text-align:center;">${e.message}</div>`;}
}
async function replyReview(id){const input=document.getElementById('reply-'+id);const reply=input?.value?.trim();if(!reply){showToast('Escribí una respuesta');return;}try{await api(`/api/reviews/${id}/reply`,{method:'PATCH',body:JSON.stringify({reply})});showToast('✅ Respuesta publicada');renderReviews();}catch(e){showToast('❌ '+e.message);}}

// ════════ PROMOS ════════
async function renderPromos(){
  const el=document.getElementById('content');

}
function showAddPromo(){const el=document.getElementById('content');el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><button onclick="renderPromos()" class="btn btn-ghost">← Volver</button><div style="font-size:15px;font-weight:800;">Nueva promoción</div></div><div class="card"><div style="margin-bottom:12px;"><label class="field-label">NOMBRE</label><input id="pr-name" placeholder="Ej: 20% de descuento" class="field-input"></div><div style="margin-bottom:12px;"><label class="field-label">TIPO</label><select id="pr-type" onchange="promoTypeChange()" class="field-input"><option value="percent_discount">% Descuento en todo el pedido</option><option value="fixed_discount">Descuento fijo ($)</option><option value="free_delivery">Envío gratis</option></select></div><div id="pr-val-wrap" style="margin-bottom:12px;"><label class="field-label">VALOR</label><input id="pr-value" type="number" placeholder="Ej: 20" class="field-input"></div><div style="margin-bottom:12px;"><label class="field-label">PEDIDO MÍNIMO ($)</label><input id="pr-min" type="number" value="0" class="field-input"></div><div style="margin-bottom:12px;"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;"><input type="checkbox" id="pr-needs-code" onchange="promoCodeToggle()" style="width:16px;height:16px;accent-color:var(--primary);"><span style="font-size:14px;font-weight:600;">Requiere código</span></label></div><div id="pr-code-wrap" style="display:none;margin-bottom:12px;"><label class="field-label">CÓDIGO</label><input id="pr-code" placeholder="Ej: VERANO20" class="field-input" style="text-transform:uppercase;"></div><button class="btn btn-primary btn-full" id="pr-save" onclick="savePromo()">Crear promoción</button></div>`;}
function promoTypeChange(){document.getElementById('pr-val-wrap').style.display=document.getElementById('pr-type')?.value==='free_delivery'?'none':'block';}
function promoCodeToggle(){document.getElementById('pr-code-wrap').style.display=document.getElementById('pr-needs-code')?.checked?'block':'none';}
async function savePromo(){const name=document.getElementById('pr-name')?.value?.trim();if(!name){showToast('Ingresá un nombre');return;}const btn=document.getElementById('pr-save');btn.textContent='Creando...';btn.disabled=true;try{await api('/api/businesses/mine/promotions',{method:'POST',body:JSON.stringify({name,type:document.getElementById('pr-type')?.value,value:parseFloat(document.getElementById('pr-value')?.value)||0,min_order_amount:parseFloat(document.getElementById('pr-min')?.value)||0,requires_code:document.getElementById('pr-needs-code')?.checked,code:document.getElementById('pr-needs-code')?.checked?document.getElementById('pr-code')?.value?.trim()?.toUpperCase():null})});renderPromos();}catch(e){btn.textContent='Crear promoción';btn.disabled=false;showToast('❌ '+e.message);}}
async function togglePromo(id,isActive){try{await api(`/api/businesses/mine/promotions/${id}`,{method:'PATCH',body:JSON.stringify({is_active:!isActive})});renderPromos();}catch(e){showToast('❌ '+e.message);}}
async function deletePromo(id){if(!confirm('¿Eliminar?'))return;try{await api(`/api/businesses/mine/promotions/${id}`,{method:'DELETE'});renderPromos();}catch(e){showToast('❌ '+e.message);}}

// ════════ NOVEDADES ════════
function renderNovedades(){
  const el=document.getElementById('content');const biz=_biz||{};
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='settings'));
  el.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><button onclick="renderSettings()" class="btn btn-ghost">← Volver</button><div style="font-size:15px;font-weight:800;">Publicar novedad</div></div>

  <button class="btn btn-primary btn-full" onclick="enviarNovedad()">📣 Publicar novedad</button>`;
  const ta=document.getElementById('novedad-text');const prev=document.getElementById('novedad-preview');const counter=document.getElementById('novedad-count');

function addNovedadEmoji(e){const ta=document.getElementById('novedad-text');if(!ta)return;ta.value+=e;ta.dispatchEvent(new Event('input'));ta.focus();}
async function enviarNovedad(){const ta=document.getElementById('novedad-text');const txt=ta?.value?.trim();if(!txt){showToast('Escribí algo antes de publicar');return;}if(!confirm(`¿Enviar novedad a todos tus clientes?

"${txt}"`))return;const btn=document.querySelector('[onclick="enviarNovedad()"]');if(btn){btn.textContent='⏳ Enviando...';btn.disabled=true;}try{const res=await api('/api/businesses/mine/broadcast',{method:'POST',body:JSON.stringify({message:txt})});showToast(`✅ Novedad enviada a ${res.sent||0} clientes`);if(ta)ta.value='';document.getElementById('novedad-count').textContent='0/280';document.getElementById('novedad-preview').textContent='Tu novedad aparecerá aquí...';}catch(e){showToast('❌ '+e.message);}finally{if(btn){btn.textContent='📣 Publicar novedad';btn.disabled=false;}}}

// ════════ RETIRO MODAL ════════
async function openRetiroModal(){
  try{_bankAccounts=await api('/api/bank-accounts');}catch(_){_bankAccounts=[];}
  const balance=_dash?.balance||0;
  document.getElementById('retiro-overlay')?.remove();
  const overlay=document.createElement('div');
  overlay.id='retiro-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99999;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);';
  overlay.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 20px 32px;max-height:88vh;overflow-y:auto;">
    <div style="width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><div style="font-size:17px;font-weight:900;">💸 Solicitar retiro</div><button onclick="document.getElementById('retiro-overlay').remove()" style="background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;">✕</button></div>
    <div style="background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:12px;opacity:.7;">SALDO DISPONIBLE</div><div style="font-size:26px;font-weight:900;">$${Math.round(balance)}</div></div>
    <div style="background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;"><label class="field-label">MONTO A RETIRAR</label><div style="display:flex;align-items:center;gap:8px;margin-top:6px;"><span style="font-size:20px;font-weight:900;">$</span><input id="rm-amount" type="number" min="1" max="${Math.floor(balance)}" placeholder="0" style="flex:1;border:none;outline:none;font-size:28px;font-weight:900;color:#fff;font-family:inherit;background:transparent;"><button onclick="document.getElementById('rm-amount').value=${Math.floor(balance)}" style="background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#60a5fa;cursor:pointer;font-family:inherit;">Todo</button></div></div>
    ${_bankAccounts.length?`<label class="field-label">MIS CUENTAS</label><div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">${_bankAccounts.map(a=>`<div onclick="selectAccount('${a.id}')" id="rmac-${a.id}" style="background:rgba(255,255,255,.05);border:2px solid ${a.is_default?'var(--primary)':'var(--border)'};border-radius:12px;padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-size:13px;font-weight:700;">${a.label}</div><div style="font-size:12px;color:var(--muted);">${a.method} · ${a.destination}</div></div><div style="display:flex;gap:6px;align-items:center;">${a.is_default?'<span style="font-size:10px;background:rgba(59,130,246,.2);color:#60a5fa;border-radius:6px;padding:2px 6px;font-weight:700;">PRINCIPAL</span>':''}<button onclick="event.stopPropagation();deleteAccount('${a.id}')" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;">🗑</button></div></div>`).join('')}</div>`:''}
    ${_bankAccounts.length<3?`<button onclick="toggleNewAccountForm()" style="width:100%;background:rgba(255,255,255,.05);border:1.5px dashed var(--border);border-radius:12px;padding:11px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;margin-bottom:10px;" id="rm-add-btn">+ Agregar cuenta nueva</button>`:''}
    <div id="rm-new-form" style="display:none;background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin-bottom:12px;">

      <select id="rm-method" class="field-input" style="margin-bottom:8px;"><optgroup label="Bancos"><option>BROU</option><option>Itaú</option><option>Santander</option><option>BBVA</option><option>Scotiabank</option></optgroup><optgroup label="Billeteras"><option>MercadoPago</option><option>Prex</option><option>OCA Blue</option></optgroup></select>
      <input id="rm-dest" placeholder="Número de cuenta" class="field-input" style="margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:10px;"><input type="checkbox" id="rm-default" style="accent-color:var(--primary);"> Marcar como principal</label>

function selectAccount(id){_selectedAccountId=id;const acc=_bankAccounts.find(a=>a.id===id);_bankAccounts.forEach(a=>{const el=document.getElementById(`rmac-${a.id}`);if(el)el.style.borderColor=a.id===id?'var(--primary)':'var(--border)';});const info=document.getElementById('rm-sel-info');const txt=document.getElementById('rm-sel-text');if(info&&txt&&acc){txt.textContent=`${acc.label} · ${acc.method} · ${acc.destination}`;info.style.display='block';}}
function toggleNewAccountForm(){const f=document.getElementById('rm-new-form');const b=document.getElementById('rm-add-btn');const showing=f.style.display!=='none';f.style.display=showing?'none':'block';if(b)b.textContent=showing?'+ Agregar cuenta nueva':'✕ Cancelar';}
async function saveNewAccount(){const label=document.getElementById('rm-label')?.value?.trim();const method=document.getElementById('rm-method')?.value;const dest=document.getElementById('rm-dest')?.value?.trim();const isDef=document.getElementById('rm-default')?.checked;if(!label||!dest){showToast('Completá todos los campos');return;}try{await api('/api/bank-accounts',{method:'POST',body:JSON.stringify({label,method,destination:dest,is_default:isDef})});showToast('✅ Cuenta guardada');await openRetiroModal();}catch(e){showToast('❌ '+e.message);}}
async function deleteAccount(id){if(!confirm('¿Eliminar?'))return;try{await api(`/api/bank-accounts/${id}`,{method:'DELETE'});_bankAccounts=_bankAccounts.filter(a=>a.id!==id);await openRetiroModal();}catch(e){showToast('❌ '+e.message);}}
async function confirmarRetiro(){const amount=parseFloat(document.getElementById('rm-amount')?.value);const balance=_dash?.balance||0;if(!amount||amount<=0){showToast('Ingresá un monto válido');return;}if(amount>balance){showToast('Saldo insuficiente');return;}if(!_selectedAccountId){showToast('Seleccioná una cuenta destino');toggleNewAccountForm();return;}const acc=_bankAccounts.find(a=>a.id===_selectedAccountId);if(!acc)return;try{await api('/api/wallet/withdraw',{method:'POST',body:JSON.stringify({amount,method:acc.method,destination:acc.destination})});showToast('✅ Solicitud enviada. Se procesará pronto.');document.getElementById('retiro-overlay')?.remove();if(_dash)_dash.balance=balance-amount;renderHome();}catch(e){showToast('❌ '+e.message);}}

// ════════ CHAT ════════
function openChat(orderId,customerName){_chatOrderId=orderId;const overlay=document.getElementById('chat-overlay');document.getElementById('chat-title').textContent='💬 '+(customerName||'Cliente');document.getElementById('chat-subtitle').textContent='Pedido #'+orderId.slice(-6).toUpperCase();overlay.style.display='flex';loadChatMessages();if(_chatPollTimer)clearInterval(_chatPollTimer);_chatPollTimer=setInterval(loadChatMessages,5000);}
function closeOrderChat(){document.getElementById('chat-overlay').style.display='none';if(_chatPollTimer){clearInterval(_chatPollTimer);_chatPollTimer=null;}_chatOrderId=null;}
async function loadChatMessages(){if(!_chatOrderId)return;try{const msgs=await api(`/api/orders/${_chatOrderId}/messages`);const el=document.getElementById('chat-messages');if(!el)return;el.innerHTML=msgs.map(m=>{const isMe=m.sender_role==='owner';return `<div style="display:flex;justify-content:${isMe?'flex-end':'flex-start'};"><div style="max-width:75%;background:${isMe?'var(--primary)':'var(--card2)'};border-radius:${isMe?'16px 16px 4px 16px':'16px 16px 16px 4px'};padding:10px 14px;font-size:14px;"><div>${m.message}</div><div style="font-size:10px;opacity:.5;margin-top:4px;text-align:right;">${new Date(m.created_at).toLocaleTimeString('es-UY',{hour:'2-digit',minute:'2-digit'})}</div></div></div>`;}).join('');el.scrollTop=el.scrollHeight;}catch(_){}}
async function sendChatMessage(){if(!_chatOrderId)return;const input=document.getElementById('chat-input');const msg=input?.value?.trim();if(!msg)return;input.value='';input.style.height='auto';try{await api(`/api/orders/${_chatOrderId}/messages`,{method:'POST',body:JSON.stringify({message:msg})});await loadChatMessages();}catch(e){showToast('❌ Error al enviar');}}

// ════════ UTILS ════════
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('show');}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}
function playAlert(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[520,660,800].forEach((freq,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;o.type='sine';g.gain.setValueAtTime(.3,ctx.currentTime+i*.12);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.15);o.start(ctx.currentTime+i*.12);o.stop(ctx.currentTime+i*.12+.15);});}catch(_){}}
</script>
