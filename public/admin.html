<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blow — Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f4ff;--surface:#ffffff;--surface2:#f0f4ff;--border:#dde3f0;
  --text:#0f1c3f;--muted:#6b7a99;--primary:#2563eb;--primary2:#1d4ed8;
  --green:#16a34a;--yellow:#d97706;--red:#dc2626;--blue:#2563eb;--purple:#7c3aed;
  --sidebar-bg:#1e3a8a;--sidebar-text:#e8eeff;--sidebar-muted:#93afd4;--sidebar-active:#2563eb;
  --r:12px;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

/* ── SIDEBAR ── */
#sidebar{width:220px;min-height:100vh;background:var(--sidebar-bg);border-right:none;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s;}
.sb-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-icon{width:36px;height:36px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--primary);}
.sb-logo-text{font-size:16px;font-weight:900;color:#fff;}
.sb-logo-sub{font-size:10px;color:var(--sidebar-muted);font-weight:500;}
nav{flex:1;padding:12px 8px;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:var(--sidebar-muted);text-transform:uppercase;letter-spacing:1px;padding:12px 8px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--sidebar-muted);font-size:13px;font-weight:600;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 4px rgba(255,255,255,.4));}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}
.sb-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px;border-radius:9px;cursor:pointer;}
.sb-user:hover{background:rgba(255,255,255,.08);}
.sb-avatar{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:700;color:#fff;}
.sb-user-role{font-size:10px;color:var(--sidebar-muted);}

/* ── MAIN ── */
#main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
#topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.04);}
#page-title{font-size:16px;font-weight:800;color:var(--text);}
.topbar-spacer{flex:1;}
.topbar-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;}
.topbar-btn:hover{border-color:var(--primary);color:var(--primary);}
#content{padding:24px;flex:1;}

/* ── CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-value{font-size:26px;font-weight:900;color:var(--text);line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.stat-trend{font-size:11px;font-weight:700;margin-top:4px;}
.stat-trend.up{color:var(--green);}
.stat-trend.down{color:var(--red);}

/* ── TABLES ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.table-head{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.table-title{font-size:14px;font-weight:800;color:var(--text);}
.tbl-search{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:13px;outline:none;width:200px;}
.tbl-search::placeholder{color:var(--muted);}
.tbl-search:focus{border-color:var(--primary);}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:#f8faff;}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8faff;}
.td-name{font-weight:700;color:var(--text);}
.td-muted{color:var(--muted);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:#dcfce7;color:#16a34a;}
.badge-red{background:#fee2e2;color:#dc2626;}
.badge-yellow{background:#fef3c7;color:#d97706;}
.badge-blue{background:#dbeafe;color:#2563eb;}
.badge-purple{background:#ede9fe;color:#7c3aed;}
.badge-gray{background:#f1f5f9;color:#64748b;}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(37,99,235,.3);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fecaca;}
.btn-success{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0;}
.btn-warning{background:#fef3c7;color:#d97706;border:1px solid #fde68a;}
.btn-purple{background:#ede9fe;color:#7c3aed;border:1px solid #ddd6fe;}

/* ── CHARTS ── */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.chart-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:14px;}
.chart-full{grid-column:1/-1;}

/* ── DATE FILTER ── */
.date-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.date-filter input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;}
.date-filter input:focus{border-color:var(--primary);}
.date-preset{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;}
.date-preset:hover,.date-preset.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(15,28,63,.4);z-index:9000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
#modal-overlay.show{display:flex;}
#modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(15,28,63,.15);}
.modal-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:16px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;}
.modal-field input:focus,.modal-field select:focus{border-color:var(--primary);}
.modal-field textarea{resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-card{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:380px;box-shadow:0 24px 80px rgba(15,28,63,.3);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo-icon{width:60px;height:60px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 10px;box-shadow:0 8px 24px rgba(37,99,235,.4);}
.login-title{font-size:22px;font-weight:900;color:var(--text);}
.login-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.login-field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
.login-field input:focus{border-color:var(--primary);}
.login-btn{width:100%;background:var(--primary);border:none;border-radius:10px;padding:13px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;box-shadow:0 4px 12px rgba(37,99,235,.3);}
.login-btn:hover{background:var(--primary2);}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:8px;min-height:20px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a8a;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;color:#fff;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(30,58,138,.4);}
#toast.show{opacity:1;}

/* ── MISC ── */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.section-title{font-size:16px;font-weight:800;color:var(--text);}
.spacer{flex:1;}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-state .empty-icon{font-size:40px;margin-bottom:10px;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.sub-warn{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:8px;}
.sub-expired{background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:12px;color:#991b1b;display:flex;align-items:center;gap:8px;}
.avatar-emoji{width:32px;height:32px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
select option{background:#fff;color:var(--text);}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--primary);}
hr{border-color:var(--border);}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%);} #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;} #menu-btn{display:flex!important;}
  .chart-row{grid-template-columns:1fr;}
  .stat-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">B</div>
      <div class="login-title">Blow Admin</div>
      <div class="login-sub">Panel de administración</div>
    </div>
    <div class="login-field"><label>Email</label><input id="l-email" type="email" placeholder="admin@blow.uy" autofocus></div>
    <div class="login-field"><label>Contraseña</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdminLogin()"></div>
    <button class="login-btn" onclick="doAdminLogin()">Ingresar →</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">B</div>
    <div><div class="sb-logo-text">Blow</div><div class="sb-logo-sub">Admin Panel</div></div>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
      <span class="nav-icon">📊</span>Dashboard
    </button>
    <button class="nav-item" onclick="showPage('orders')" id="nav-orders">
      <span class="nav-icon">📦</span>Pedidos
      <span class="nav-badge" id="badge-orders" style="display:none"></span>
    </button>
    <button class="nav-item" onclick="showPage('withdrawals')" id="nav-withdrawals">
      <span class="nav-icon">💸</span>Retiros
      <span class="nav-badge" id="badge-withdrawals" style="display:none"></span>
    </button>

    <div class="nav-section">Gestión</div>
    <button class="nav-item" onclick="showPage('banners')" id="nav-banners">
      <span class="nav-icon">🖼️</span>Banners
    </button>
    <button class="nav-item" onclick="showPage('businesses')" id="nav-businesses">
      <span class="nav-icon">🏪</span>Negocios
    </button>
    <button class="nav-item" onclick="showPage('subscriptions')" id="nav-subscriptions">
      <span class="nav-icon">🔄</span>Suscripciones
    </button>
    <button class="nav-item" onclick="showPage('users')" id="nav-users">
      <span class="nav-icon">👥</span>Usuarios
    </button>

    <div class="nav-section">Sistema</div>
    <button class="nav-item" onclick="showPage('support')" id="nav-support">
      <span class="nav-icon">🛟</span>Soporte chat
    </button>
    <button class="nav-item" onclick="showPage('config')" id="nav-config">
      <span class="nav-icon">⚙️</span>Configuración
    </button>
    <button class="nav-item" onclick="showPage('export')" id="nav-export">
      <span class="nav-icon">📤</span>Exportar datos
    </button>
  </nav>
  <div class="sb-footer">
    <div class="sb-user" onclick="logout()">
      <div class="sb-avatar" id="sb-avatar">A</div>
      <div><div class="sb-user-name" id="sb-name">Admin</div><div class="sb-user-role">🔧 Administrador</div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button id="menu-btn" style="display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
    <div id="page-title">Dashboard</div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="refreshCurrent()">🔄 Actualizar</button>
  </div>
  <div id="content">
    <div class="spinner"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box"></div>
</div>

<div id="toast"></div>

<script>
const API = '';
let adminToken = localStorage.getItem('blow_admin_token');
let adminUser  = JSON.parse(localStorage.getItem('blow_admin_user') || 'null');
let currentPage = 'dashboard';

// ── AUTH ──────────────────────────────────────
async function doAdminLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Completá todos los campos'; return; }
  try {
    const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password: pass }) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Error al iniciar sesión'; return; }
    if (data.user.role !== 'admin') { errEl.textContent = '⛔ Esta cuenta no tiene acceso de admin'; return; }
    adminToken = data.token;
    adminUser  = data.user;
    localStorage.setItem('blow_admin_token', adminToken);
    localStorage.setItem('blow_admin_user', JSON.stringify(adminUser));
    initAdmin();
  } catch(e) { errEl.textContent = 'Error de conexión'; }
}

function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  localStorage.removeItem('blow_admin_token');
  localStorage.removeItem('blow_admin_user');
  location.reload();
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` };
  const res = await fetch(API + path, { ...opts, headers: { ...headers, ...opts.headers } });
  if (res.status === 401) { logout(); return; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
  return data;
}

// ── INIT ──────────────────────────────────────
function initAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('sb-name').textContent = adminUser?.name || 'Admin';
  document.getElementById('sb-avatar').textContent = (adminUser?.name || 'A')[0].toUpperCase();
  loadBadges();
  showPage('dashboard');
  setInterval(loadBadges, 30000);
}

async function loadBadges() {
  try {
    const stats = await api('/api/admin/stats');
    const pw = stats.pendingWithdrawals || 0;
    const pendingOrders = (stats.orderStats || []).find(s => s.status === 'confirmed')?.c || 0;
    const wb = document.getElementById('badge-withdrawals');
    const ob = document.getElementById('badge-orders');
    if (pw > 0) { wb.textContent = pw; wb.style.display = ''; } else { wb.style.display = 'none'; }
    if (pendingOrders > 0) { ob.textContent = pendingOrders; ob.style.display = ''; } else { ob.style.display = 'none'; }
  } catch(e) {}
}

function refreshCurrent() { showPage(currentPage); }

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');
  const titles = { dashboard:'Dashboard', orders:'Pedidos', withdrawals:'Retiros', banners:'Banners', businesses:'Negocios', subscriptions:'Suscripciones', users:'Usuarios', support:'Soporte chat', config:'Configuración', export:'Exportar datos' };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = { dashboard: renderDashboard, orders: renderOrders, withdrawals: renderWithdrawals, banners: renderBanners, businesses: renderBusinesses, subscriptions: renderSubscriptions, users: renderUsers, support: renderSupport, config: renderConfig, export: renderExport };
  if (pages[page]) pages[page]();
}

// ── DASHBOARD ──────────────────────────────────
let chartRevenue = null, chartOrders = null;
let dashFrom = fmtDate(new Date(Date.now() - 30*24*60*60*1000));
let dashTo   = fmtDate(new Date());

function fmtDate(d) { return d.toISOString().split('T')[0]; }
function fmtMoney(n) { return '$' + Math.round(n || 0).toLocaleString('es-UY'); }
function fmtNum(n) { return parseInt(n || 0).toLocaleString('es-UY'); }

async function renderDashboard() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Resumen de actividad</div>
      <div class="spacer"></div>
      <div class="date-filter">
        <button class="date-preset" onclick="setDashPreset(7,this)">7d</button>
        <button class="date-preset active" onclick="setDashPreset(30,this)">30d</button>
        <button class="date-preset" onclick="setDashPreset(90,this)">90d</button>
        <input type="date" id="dash-from" value="${dashFrom}" onchange="dashFrom=this.value;loadDashData()">
        <input type="date" id="dash-to" value="${dashTo}" onchange="dashTo=this.value;loadDashData()">
      </div>
    </div>
    <div class="stat-grid" id="dash-stats"><div class="spinner"></div></div>
    <div class="chart-row">
      <div class="chart-card chart-full">
        <div class="chart-title">💰 Ingresos diarios (GMV)</div>
        <canvas id="chart-revenue" height="80"></canvas>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">📦 Pedidos por estado</div>
        <canvas id="chart-status" height="200"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">👤 Usuarios nuevos</div>
        <canvas id="chart-users" height="200"></canvas>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-title">🏆 Top negocios (GMV)</div>

function setDashPreset(days, btn) {
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  dashTo = fmtDate(new Date());
  dashFrom = fmtDate(new Date(Date.now() - days*24*60*60*1000));
  const df = document.getElementById('dash-from');
  const dt = document.getElementById('dash-to');
  if (df) df.value = dashFrom;
  if (dt) dt.value = dashTo;
  loadDashData();
}

async function loadDashData() {
  try {
    const d = await api(`/api/admin/stats/advanced?from=${dashFrom}&to=${dashTo}`);

      <div class="stat-card">

      </div>

        <div class="stat-sub" style="color:var(--yellow)">⚠️ ${d.subscriptionStats?.expiring_soon || 0} vencen pronto</div>
      </div>`;

    // Revenue chart
    const labels = d.dailyRevenue.map(r => new Date(r.day).toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit' }));
    const revenues = d.dailyRevenue.map(r => parseFloat(r.revenue) || 0);
    const fees = d.dailyRevenue.map(r => parseFloat(r.fee) || 0);
    if (chartRevenue) chartRevenue.destroy();
    const ctx1 = document.getElementById('chart-revenue')?.getContext('2d');
    if (ctx1) chartRevenue = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'GMV', data: revenues, backgroundColor:'rgba(234,53,107,.3)', borderColor:'#ea356b', borderWidth:2, borderRadius:4 },

      options: { responsive:true, plugins:{ legend:{ labels:{ color:'#6b7a99', font:{size:11} } } }, scales:{ x:{ grid:{color:'#dde3f0'}, ticks:{color:'#6b7a99', font:{size:10}} }, y:{ grid:{color:'#dde3f0'}, ticks:{color:'#6b7a99', callback:v=>'$'+v.toLocaleString()} } } }
    });

    // Status donut
    const statusLabels = { pending:'Pendiente', confirmed:'Confirmado', preparing:'Preparando', ready:'Listo', delivering:'En camino', delivered:'Entregado', cancelled:'Cancelado' };
    const statusColors = { pending:'#f59e0b', confirmed:'#3b82f6', preparing:'#8b5cf6', ready:'#22c55e', delivering:'#ea356b', delivered:'#22c55e', cancelled:'#ef4444' };
    const sl = d.ordersByStatus.map(s => statusLabels[s.status] || s.status);
    const sc = d.ordersByStatus.map(s => parseInt(s.c));
    const scolors = d.ordersByStatus.map(s => statusColors[s.status] || '#7b8099');
    const ctx2 = document.getElementById('chart-status')?.getContext('2d');
    if (ctx2) new Chart(ctx2, {
      type: 'doughnut',
      data: { labels: sl, datasets: [{ data: sc, backgroundColor: scolors, borderWidth:2, borderColor:'#fff' }] },
      options: { responsive:true, plugins:{ legend:{ position:'bottom', labels:{ color:'#6b7a99', font:{size:11}, padding:12 } } } }
    });

    // New users line
    const ul = d.newUsers.map(u => new Date(u.day).toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit' }));
    const uv = d.newUsers.map(u => parseInt(u.c));
    const ctx3 = document.getElementById('chart-users')?.getContext('2d');
    if (ctx3) new Chart(ctx3, {
      type: 'line',
      data: { labels: ul, datasets: [{ label:'Nuevos usuarios', data: uv, borderColor:'#8b5cf6', backgroundColor:'rgba(139,92,246,.1)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#8b5cf6' }] },
      options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ grid:{color:'#dde3f0'}, ticks:{color:'#6b7a99', font:{size:10}} }, y:{ grid:{color:'#dde3f0'}, ticks:{color:'#6b7a99'}, beginAtZero:true } } }

    // Top businesses
    document.getElementById('top-biz').innerHTML = d.topBusinesses.length ? d.topBusinesses.map((b,i) => `

        <div style="font-size:11px;font-weight:700;color:var(--muted);width:18px;">#${i+1}</div>

        </div>
        <div style="font-size:13px;font-weight:800;color:var(--green);">${fmtMoney(b.revenue)}</div>
      </div>`).join('') : '<div class="empty-state"><div class="empty-icon">📊</div>Sin datos</div>';

    // Top customers
    document.getElementById('top-customers').innerHTML = d.topCustomers.length ? d.topCustomers.map((u,i) => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:11px;font-weight:700;color:var(--muted);width:18px;">#${i+1}</div>
        <div style="width:28px;height:28px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary);">${u.name[0].toUpperCase()}</div>
        <div style="flex:1;min-width:0;">

async function loadOrders() {
  const status = document.getElementById('ord-status')?.value || '';

    const statusBadge = { pending:'badge-yellow', confirmed:'badge-blue', preparing:'badge-purple', ready:'badge-green', delivering:'badge-blue', delivered:'badge-green', cancelled:'badge-red' };
    const statusLabel = { pending:'Pendiente', confirmed:'Confirmado', preparing:'Preparando', ready:'Listo', delivering:'En camino', delivered:'Entregado', cancelled:'Cancelado' };
    document.getElementById('orders-body').innerHTML = orders.length ? `
      <table>
        <thead><tr>
          <th>ID</th><th>Cliente</th><th>Negocio</th><th>Total</th>
          <th>Pago</th><th>Estado</th><th>Fecha</th><th>Acciones</th>
        </tr></thead>
        <tbody>
          ${orders.map(o => `<tr>
            <td class="td-muted" style="font-family:monospace;font-size:11px;">#${o.id.slice(-8).toUpperCase()}</td>
            <td><div class="td-name">${o.customer_name}</div></td>
            <td class="td-muted">${o.business_name}</td>
            <td style="font-weight:700;color:var(--text);">$${o.total}</td>
            <td class="td-muted">${o.payment_method || '—'}</td>
            <td><span class="badge ${statusBadge[o.status]||'badge-gray'}">${statusLabel[o.status]||o.status}</span></td>
            <td class="td-muted" style="font-size:11px;">${new Date(o.created_at).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>
              <div style="display:flex;gap:5px;">
                <button class="btn btn-ghost" onclick="viewOrder('${o.id}')">Ver</button>
                ${!['delivered','cancelled'].includes(o.status) ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}')">Cancelar</button>` : ''}
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div class="empty-state"><div class="empty-icon">📦</div>No hay pedidos</div>';
  } catch(e) { document.getElementById('orders-body').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div>${e.message}</div>`; }

async function viewOrder(id) {
  const orders = await api(`/api/admin/orders?search=${id.slice(-8)}`).catch(() => []);
  const o = orders.find(x => x.id === id);
  if (!o) { showToast('Pedido no encontrado'); return; }
  openModal(`
    <div class="modal-title">📦 Pedido #${o.id.slice(-8).toUpperCase()}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Cliente</div><div style="font-weight:700;margin-top:3px;">${o.customer_name}</div></div>
      <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Negocio</div><div style="font-weight:700;margin-top:3px;">${o.business_name}</div></div>
      <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Total</div><div style="font-weight:700;color:var(--green);margin-top:3px;">$${o.total}</div></div>
      <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Pago</div><div style="font-weight:700;margin-top:3px;">${o.payment_method || '—'}</div></div>
      <div style="grid-column:1/-1;"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Dirección</div><div style="margin-top:3px;">${o.address || '—'}</div></div>
      ${o.notes ? `<div style="grid-column:1/-1;"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Notas</div><div style="margin-top:3px;">${o.notes}</div></div>` : ''}
    </div>
    ${o.items?.length ? `<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Items</div>
    ${o.items.map(i => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;"><span>${i.name} x${i.qty}</span><span style="font-weight:700;">$${i.price * i.qty}</span></div>`).join('')}` : ''}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      ${!['delivered','cancelled'].includes(o.status) ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}');closeModal()">Cancelar pedido</button>` : ''}
    </div>`);
}

async function cancelOrder(id) {
  const reason = prompt('Motivo de cancelación (opcional):');
  if (reason === null) return;
  try {
    await api(`/api/admin/orders/${id}/cancel`, { method:'POST', body: JSON.stringify({ reason }) });
    showToast('✅ Pedido cancelado');
    loadOrders();
  } catch(e) { showToast('❌ ' + e.message); }
}

async function renderWithdrawals() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Retiros de billetera</div>
      <div class="spacer"></div>
      <select class="filter-select" id="wd-filter" onchange="loadWithdrawals()">
        <option value="">Todos</option>
        <option value="pending" selected>Pendientes</option>
        <option value="completed">Completados</option>
        <option value="rejected">Rechazados</option>
      </select>
    </div>
    <div id="withdrawals-body"><div class="spinner"></div></div>`;
  document.getElementById('wd-filter').value = 'pending';
  loadWithdrawals();
}

async function loadWithdrawals() {
  const filter = document.getElementById('wd-filter')?.value || '';
  try {
    let ws = await api('/api/admin/withdrawals');
    if (filter) ws = ws.filter(w => w.status === filter);
    const pending = ws.filter(w => w.status === 'pending');
    const rest = ws.filter(w => w.status !== 'pending');
    document.getElementById('withdrawals-body').innerHTML = ws.length ? `
      ${pending.length ? `
        <div style="margin-bottom:8px;"><div class="sub-warn">⏳ ${pending.length} retiro${pending.length!==1?'s':''} pendiente${pending.length!==1?'s':''} de procesamiento</div></div>
        <div class="table-wrap" style="margin-bottom:20px;">
          <table><thead><tr><th>Dueño</th><th>Monto</th><th>Método</th><th>Destino</th><th>Solicitado</th><th>Acciones</th></tr></thead>
          <tbody>${pending.map(w=>`<tr>
            <td><div class="td-name">${w.owner_name}</div><div class="td-muted" style="font-size:11px;">${w.email}</div></td>
            <td style="font-size:18px;font-weight:900;color:var(--yellow);">$${w.amount}</td>
            <td><span class="badge badge-blue">${w.method==='mercadopago'?'💳 MP':'🏦 Banco'}</span></td>
            <td class="td-muted" style="font-size:12px;max-width:180px;">${w.destination}</td>
            <td class="td-muted" style="font-size:11px;">${new Date(w.created_at).toLocaleString('es-UY',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td><div style="display:flex;gap:5px;">
              <button class="btn btn-success" onclick="approveWithdrawal('${w.id}')">✓ Confirmar</button>
              <button class="btn btn-danger" onclick="rejectWithdrawal('${w.id}')">✕ Rechazar</button>
            </div></td>
          </tr>`).join('')}</tbody></table>
        </div>` : ''}
      ${rest.length ? `
        <div class="table-wrap">
          <table><thead><tr><th>Dueño</th><th>Monto</th><th>Método</th><th>Estado</th><th>Procesado</th></tr></thead>
          <tbody>${rest.map(w=>`<tr>
            <td><div class="td-name">${w.owner_name}</div><div class="td-muted" style="font-size:11px;">${w.email}</div></td>
            <td style="font-weight:700;">$${w.amount}</td>
            <td class="td-muted">${w.method==='mercadopago'?'MP':'Banco'}</td>
            <td><span class="badge ${w.status==='completed'?'badge-green':'badge-red'}">${w.status==='completed'?'✅ Pagado':'❌ Rechazado'}</span></td>
            <td class="td-muted" style="font-size:11px;">${w.processed_at?new Date(w.processed_at).toLocaleDateString('es-UY'):'—'}</td>
          </tr>`).join('')}</tbody></table>
        </div>` : ''}` : '<div class="empty-state"><div class="empty-icon">💸</div>No hay retiros en esta categoría</div>';
  } catch(e) { document.getElementById('withdrawals-body').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div>${e.message}</div>`; }
}

async function approveWithdrawal(id) {
  if (!confirm('¿Confirmar que ya procesaste el pago?\n⏱ El dueño recibirá una notificación con el plazo de 24hs hábiles.')) return;
  try { await api(`/api/admin/withdrawals/${id}/approve`, { method:'POST' }); showToast('✅ Retiro confirmado — notificación enviada'); loadWithdrawals(); }
  catch(e) { showToast('❌ ' + e.message); }
}
async function rejectWithdrawal(id) {
  const reason = prompt('Motivo del rechazo (opcional):');
  if (reason === null) return;
  try { await api(`/api/admin/withdrawals/${id}/reject`, { method:'POST', body: JSON.stringify({ reason }) }); showToast('✅ Rechazado — saldo devuelto'); loadWithdrawals(); }
  catch(e) { showToast('❌ ' + e.message); }
}

async function createBanner() {
  const title = document.getElementById('bn-title').value.trim();
  const subtitle = document.getElementById('bn-sub').value.trim();
  const bg_color = document.getElementById('bn-color').value;
  const emoji = document.getElementById('bn-emoji').value.trim();
  const highlight = document.getElementById('bn-highlight').value.trim();
  const highlight_label = document.getElementById('bn-label').value.trim();
  const link = document.getElementById('bn-link').value.trim();
  const sort_order = parseInt(document.getElementById('bn-order').value) || 0;
  const imgInput = document.getElementById('bn-image');
  if (!title) return alert('El título es obligatorio');

  let image_url = '';
  if (imgInput?.files[0]) {
    const fd = new FormData();
    fd.append('photo', imgInput.files[0]);
    try {
      const upRes = await fetch('/api/admin/banners/upload-image', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd
      });
      const upData = await upRes.json();
      if (upData.url) image_url = upData.url;
    } catch(e) { return alert('Error subiendo imagen: ' + e.message); }
  }

  try {
    await api('/api/admin/banners', { method:'POST', body: JSON.stringify({title,subtitle,bg_color,emoji,highlight,highlight_label,link_url:link,sort_order,is_active:true,image_url,banner_type:currentBannerType}) });
    ['bn-title','bn-sub','bn-emoji','bn-highlight','bn-label','bn-link'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('bn-order').value = '0';
    document.getElementById('bn-color').value = '#ea356b';
    document.getElementById('bn-preview').style.background = '#ea356b';
    document.getElementById('bn-p-title').textContent = 'Título del banner';
    document.getElementById('bn-p-sub').textContent = '';
    document.getElementById('bn-p-emoji').textContent = '';
    document.getElementById('bn-p-hl').style.display = 'none';
    document.getElementById('bn-p-tag').style.display = 'none';
    document.getElementById('bn-p-img').style.display = 'none';
    document.getElementById('bn-p-emoji').style.display = '';
    if (imgInput) imgInput.value = '';
    loadBannersList();
  } catch(e) { alert('Error: ' + e.message); }
}

async function toggleBanner(id, isActive) {
  try {
    await api('/api/admin/banners/' + id, { method:'PATCH', body: JSON.stringify({is_active:!isActive, active:!isActive}) });
    loadBannersList();

async function deleteBanner(id) {

  if (!confirm(`¿Acceder al portal de "${name}"?\n\nSe abrirá la app principal con acceso a su cuenta por 2 horas. Esta acción queda registrada.`)) return;
  try {
    const data = await api(`/api/admin/impersonate/${userId}`, { method:'POST' });

    localStorage.setItem('blow_imp_token', data.token);
    localStorage.setItem('blow_imp_user', JSON.stringify(data.user));
    // Abrir app en nueva pestaña con token temporal
    const url = new URL('/', location.origin);
    url.searchParams.set('imp_token', data.token);
    url.searchParams.set('imp_user', encodeURIComponent(JSON.stringify(data.user)));
    window.open(url.toString(), '_blank');
    showToast(`✅ Abriendo portal de ${name} en nueva pestaña`);

}

async function renderSubscriptions() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Suscripciones</div>
      <div class="spacer"></div>
      <select class="filter-select" id="sub-filter" onchange="loadSubscriptions()">
        <option value="">Todas</option>
        <option value="active">Activas</option>
        <option value="expiring">Vencen en 7 días</option>
        <option value="expired">Vencidas</option>
        <option value="cancelled">Canceladas</option>
      </select>
    </div>
    <div id="subs-body"><div class="spinner"></div></div>`;
  loadSubscriptions();
}

async function loadSubscriptions() {
  const filter = document.getElementById('sub-filter')?.value || '';
  try {
    let subs = await api('/api/admin/subscriptions/detail');
    const now = new Date();
    const in7 = new Date(now.getTime() + 7*24*60*60*1000);
    if (filter === 'active') subs = subs.filter(s => s.status === 'active' && new Date(s.current_period_end) > now);
    else if (filter === 'expiring') subs = subs.filter(s => s.status === 'active' && new Date(s.current_period_end) <= in7 && new Date(s.current_period_end) > now);
    else if (filter === 'expired') subs = subs.filter(s => s.status === 'active' && new Date(s.current_period_end) <= now);
    else if (filter === 'cancelled') subs = subs.filter(s => s.status === 'cancelled');

    const expiringSoon = subs.filter(s => s.status === 'active' && new Date(s.current_period_end) <= in7 && new Date(s.current_period_end) > now);
    const expired = subs.filter(s => s.status === 'active' && new Date(s.current_period_end) <= now);

    document.getElementById('subs-body').innerHTML = `
      ${expired.length ? `<div class="sub-expired" style="margin-bottom:12px;">⛔ ${expired.length} suscripción${expired.length!==1?'es':''} vencida${expired.length!==1?'s':''} — el negocio no debería estar activo</div>` : ''}
      ${expiringSoon.length ? `<div class="sub-warn" style="margin-bottom:12px;">⚠️ ${expiringSoon.length} suscripción${expiringSoon.length!==1?'es':''} vence${expiringSoon.length!==1?'n':''} en los próximos 7 días</div>` : ''}
      <div class="table-wrap">
        <table>
          <thead><tr><th>Negocio</th><th>Dueño</th><th>GMV Total</th><th>Estado</th><th>Vence</th><th>Días restantes</th><th>Acciones</th></tr></thead>
          <tbody>${subs.length ? subs.map(s => {
            const end = new Date(s.current_period_end);
            const days = Math.ceil((end - now) / (24*60*60*1000));
            const daysLabel = s.status === 'cancelled' ? '—' : days < 0 ? `<span style="color:var(--red);font-weight:700;">Vencida hace ${Math.abs(days)}d</span>` : days <= 7 ? `<span style="color:var(--yellow);font-weight:700;">${days}d ⚠️</span>` : `<span style="color:var(--green);">${days}d</span>`;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px;">
                <div class="avatar-emoji">${s.logo_emoji||'🏪'}</div>
                <div><div class="td-name">${s.business_name}</div><div class="td-muted" style="font-size:11px;">${s.city||''} · ${s.category||''}</div></div>
              </div></td>
              <td><div class="td-name">${s.owner_name}</div><div class="td-muted" style="font-size:11px;">${s.owner_email}</div></td>
              <td style="font-weight:700;color:var(--green);">$${Math.round(s.total_revenue||0).toLocaleString()}</td>
              <td><span class="badge ${s.status==='active'?'badge-green':s.status==='cancelled'?'badge-red':'badge-gray'}">${s.status==='active'?'● Activa':s.status==='cancelled'?'Cancelada':s.status}</span></td>
              <td class="td-muted" style="font-size:11px;">${s.current_period_end ? new Date(s.current_period_end).toLocaleDateString('es-UY') : '—'}</td>
              <td>${daysLabel}</td>
              <td><div style="display:flex;gap:5px;">
                ${s.status === 'active' ? `<button class="btn btn-success" onclick="activateSub('${s.id}')">🔄 Renovar</button><button class="btn btn-danger" onclick="cancelSub('${s.id}')">✕ Cancelar</button>` : `<button class="btn btn-success" onclick="activateSub('${s.id}')">✓ Activar</button>`}
              </div></td>
            </tr>`;
          }).join('') : '<tr><td colspan="7" class="empty-state">Sin suscripciones</td></tr>'}</tbody>
        </table>
      </div>`;
  } catch(e) { document.getElementById('subs-body').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div>${e.message}</div>`; }
}

async function activateSub(id) {
  try { await api(`/api/admin/subscriptions/${id}/activate`, { method:'POST' }); showToast('✅ Suscripción activada'); loadSubscriptions(); }
  catch(e) { showToast('❌ ' + e.message); }

      <select id="eu-role">
        <option value="customer" ${u.role==='customer'?'selected':''}>Cliente</option>
        <option value="owner" ${u.role==='owner'?'selected':''}>Dueño</option>
        <option value="delivery" ${u.role==='delivery'?'selected':''}>Delivery</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
      </select>
    </div>
    <hr style="border-color:var(--border);margin:14px 0;">
    <div class="modal-field"><label>Nueva contraseña (opcional)</label><input id="eu-pass" type="password" placeholder="Dejar vacío para no cambiar"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser('${id}')">💾 Guardar</button>
    </div>`);
}

async function saveUser(id) {
  try {
    await api(`/api/admin/users/${id}`, { method:'PATCH', body: JSON.stringify({
      name: document.getElementById('eu-name').value,
      email: document.getElementById('eu-email').value,
      phone: document.getElementById('eu-phone').value,
      role: document.getElementById('eu-role').value,
    })});
    const pass = document.getElementById('eu-pass').value;
    if (pass && pass.length >= 6) {
      await api(`/api/admin/users/${id}/reset-password`, { method:'POST', body: JSON.stringify({ password: pass }) });
    }
    showToast('✅ Usuario actualizado');
    closeModal();
    loadUsers();
  } catch(e) { showToast('❌ ' + e.message); }
}

async function toggleBan(id, isBanned) {
  const reason = isBanned ? null : prompt('Motivo del baneo (opcional):');
  if (!isBanned && reason === null) return;
  try {
    await api(`/api/admin/users/${id}/ban`, { method:'POST', body: JSON.stringify({ banned: !isBanned, reason }) });
    showToast(isBanned ? '✅ Usuario desbaneado' : '⛔ Usuario baneado');
    loadUsers();
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── SOPORTE CHAT ──────────────────────────────
let _supportActiveUser = null;
let _supportPollAdmin = null;

async function renderSupport() {
  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:20px;height:calc(100vh - 120px);">
      <!-- Conversations list -->
      <div style="width:320px;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;">
        <div style="padding:16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:800;">💬 Conversaciones</div>
        <div id="support-convos" style="flex:1;overflow-y:auto;"></div>
      </div>
      <!-- Chat area -->
      <div style="flex:1;background:var(--surface);border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;">
        <div id="support-chat-header" style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;color:var(--muted);">Seleccioná una conversación</div>
        <div id="support-admin-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:#f8fafc;">
          <div style="text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;">← Elegí un usuario para responder</div>
        </div>
        <div id="support-admin-input-area" style="display:none;padding:12px 16px;background:#fff;border-top:1px solid var(--border);">
          <div style="display:flex;gap:8px;">
            <input id="support-admin-input" placeholder="Escribí tu respuesta..." style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;font-family:'Inter',sans-serif;outline:none;"
              onkeydown="if(event.key==='Enter')sendAdminSupportReply()">
            <button onclick="sendAdminSupportReply()" style="background:var(--primary);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">Enviar</button>
          </div>
        </div>
      </div>
    </div>
  `;
  loadSupportConversations();
  clearInterval(_supportPollAdmin);
  _supportPollAdmin = setInterval(() => {
    if (currentPage === 'support') {
      loadSupportConversations();
      if (_supportActiveUser) loadAdminChatMessages(_supportActiveUser);
    } else clearInterval(_supportPollAdmin);
  }, 6000);
}

async function loadSupportConversations() {
  try {
    const convos = await api('/api/admin/support/conversations');
    const el = document.getElementById('support-convos');
    if (!el) return;
    if (!convos.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px 16px;font-size:13px;">No hay conversaciones de soporte</div>'; return; }
    el.innerHTML = convos.map(c => {
      const active = _supportActiveUser === c.user_id;
      const time = new Date(c.last_message_at).toLocaleString('es-UY', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div onclick="openAdminChat('${c.user_id}','${esc(c.user_name||'Usuario')}')" style="padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);background:${active?'var(--surface2)':'transparent'};transition:.15s;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-size:13px;font-weight:700;color:var(--text);">${esc(c.user_name||'Usuario')}</div>
          <div style="font-size:10px;color:var(--muted);">${time}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc((c.last_message||'').slice(0,60))}</div>
      </div>`;
    }).join('');
  } catch(e) { console.error('loadSupportConversations:', e); }
}

async function openAdminChat(userId, userName) {
  _supportActiveUser = userId;
  document.getElementById('support-chat-header').innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><div style="width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;">${(userName||'U')[0].toUpperCase()}</div><div><div style="font-size:14px;font-weight:800;">${esc(userName)}</div><div style="font-size:11px;color:var(--muted);">ID: ${userId.slice(0,8)}...</div></div></div>`;
  document.getElementById('support-admin-input-area').style.display = '';
  loadAdminChatMessages(userId);
  loadSupportConversations(); // refresh active highlight
}

async function loadAdminChatMessages(userId) {
  const container = document.getElementById('support-admin-messages');
  if (!container) return;
  try {
    const msgs = await api('/api/admin/support/messages/' + userId);
    if (!msgs.length) { container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">Sin mensajes</div>'; return; }
    container.innerHTML = msgs.map(m => {
      const isAdmin = m.sender_role === 'admin';
      const time = new Date(m.created_at).toLocaleTimeString('es-UY', {hour:'2-digit',minute:'2-digit'});
      return `<div style="max-width:75%;${isAdmin?'align-self:flex-end;':'align-self:flex-start;'}">
        <div style="background:${isAdmin?'var(--primary)':'#fff'};color:${isAdmin?'#fff':'var(--text)'};border-radius:${isAdmin?'12px 12px 4px 12px':'12px 12px 12px 4px'};padding:10px 14px;font-size:13px;line-height:1.4;${isAdmin?'':'border:1px solid var(--border);'}">${esc(m.body)}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;${isAdmin?'text-align:right;':''}">${isAdmin?'Vos (admin)':'Cliente'} · ${time}</div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  } catch { container.innerHTML = '<div style="color:var(--red);padding:20px;">Error al cargar</div>'; }
}

async function sendAdminSupportReply() {
  const input = document.getElementById('support-admin-input');
  if (!input || !_supportActiveUser) return;
  const body = input.value.trim();
  if (!body) return;
  input.value = '';
  try {
    await api('/api/admin/support/messages/' + _supportActiveUser, { method:'POST', body: JSON.stringify({ body }) });
    loadAdminChatMessages(_supportActiveUser);
  } catch(e) { alert('Error: ' + e.message); }
}

// ── CONFIGURACIÓN ──────────────────────────────
async function renderConfig() {
  document.getElementById('content').innerHTML = `<div class="spinner"></div>`;
  try {
    const cfg = await api('/api/admin/settings');
    document.getElementById('content').innerHTML = `
      <div class="section-title" style="margin-bottom:20px;">⚙️ Configuración de la plataforma</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="chart-card">
          <div class="chart-title">💰 Precios y comisiones</div>
          <div class="modal-field"><label>Precio suscripción mensual ($UYU)</label><input id="cfg-price" type="number" value="${cfg.registration_fee||2990}"></div>
          <div class="modal-field"><label>Comisión plataforma (%)</label><input id="cfg-fee" type="number" step="0.1" value="${cfg.platform_fee_percent||0}"></div>
          <button class="btn btn-primary" onclick="saveConfig()">💾 Guardar cambios</button>
        </div>
        <div class="chart-card">
          <div class="chart-title">📊 Stats rápidas</div>
          <div id="quick-stats"><div class="spinner"></div></div>
        </div>
      </div>`;
    loadQuickStats();
  } catch(e) { document.getElementById('content').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div>${e.message}</div>`; }
}

async function loadQuickStats() {
  try {
    const s = await api('/api/admin/stats');
    const el = document.getElementById('quick-stats');
    if (!el) return;
    const users = s.userStats || [];
    const orders = s.orderStats || [];
    el.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${users.map(u=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);"><span style="color:var(--muted);">${{customer:'Clientes',owner:'Dueños',delivery:'Delivery',admin:'Admins'}[u.role]||u.role}</span><span style="font-weight:700;">${u.c}</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:6px 0;"><span style="color:var(--muted);">Negocios</span><span style="font-weight:700;">${s.businesses}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;"><span style="color:var(--muted);">GMV Total</span><span style="font-weight:700;color:var(--green);">$${Math.round(s.revenue||0).toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;padding:6px 0;"><span style="color:var(--muted);">Retiros pendientes</span><span style="font-weight:700;color:${s.pendingWithdrawals>0?'var(--yellow)':'var(--green)'};">${s.pendingWithdrawals}</span></div>
      </div>`;
  } catch(e) {}
}

async function saveConfig() {
  try {
    await api('/api/admin/settings', { method:'POST', body: JSON.stringify({
      registration_fee: parseFloat(document.getElementById('cfg-price').value) || 2990,
      platform_fee_percent: parseFloat(document.getElementById('cfg-fee').value) || 0,
    })});
    showToast('✅ Configuración guardada');
  } catch(e) { showToast('❌ ' + e.message); }
}

// ── EXPORTAR ──────────────────────────────────
function renderExport() {
  const today = fmtDate(new Date());
  const month = fmtDate(new Date(Date.now()-30*24*60*60*1000));
  document.getElementById('content').innerHTML = `
    <div class="section-title" style="margin-bottom:20px;">📤 Exportar datos</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
      <div class="chart-card">
        <div class="chart-title">👥 Usuarios</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Todos los usuarios registrados con rol, ciudad y fecha.</p>
        <a href="/api/admin/export/users" target="_blank" style="text-decoration:none;"><button class="btn btn-primary" style="width:100%;">⬇️ Descargar CSV</button></a>
      </div>
      <div class="chart-card">
        <div class="chart-title">🏪 Negocios</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Negocios con dueños, estado de suscripción y ciudad.</p>
        <a href="/api/admin/export/businesses" target="_blank" style="text-decoration:none;"><button class="btn btn-primary" style="width:100%;">⬇️ Descargar CSV</button></a>
      </div>
      <div class="chart-card">
        <div class="chart-title">📦 Pedidos por rango</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">Pedidos filtrados por fecha con totales y fees.</p>
        <div style="display:flex;gap:6px;margin-bottom:12px;">
          <input type="date" id="exp-from" value="${month}" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;color:var(--text);font-size:12px;outline:none;">
          <input type="date" id="exp-to" value="${today}" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px;color:var(--text);font-size:12px;outline:none;">
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="exportOrders()">⬇️ Descargar CSV</button>
      </div>
    </div>`;
}

function exportOrders() {
  const from = document.getElementById('exp-from').value;
  const to   = document.getElementById('exp-to').value;
  window.open(`/api/admin/export/orders?from=${from}&to=${to}`, '_blank');
}

// ── MODAL ──────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

// ── TOAST ──────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── UTILS ──────────────────────────────────────
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Handle impersonation token from URL (for when app opens with imp_token)
const _urlP = new URLSearchParams(window.location.search);
const _impToken = _urlP.get('imp_token');
const _impUser  = _urlP.get('imp_user');
if (_impToken && _impUser) {
  // Store in main app storage and redirect to clean URL
  localStorage.setItem('da_token', _impToken);
  localStorage.setItem('da_user', _impUser);
  window.history.replaceState({}, '', '/');
  // This page is now acting as a redirect bridge
}

// ── BOOT ──────────────────────────────────────
if (adminToken && adminUser?.role === 'admin') {
  initAdmin();
}
</script>
